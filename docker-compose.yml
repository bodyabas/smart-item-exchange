services:
  api:
    build: .
    command: >
      sh -c "flask --app manage.py init-db &&
             gunicorn --bind 0.0.0.0:5000 manage:app"
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/smart_item_exchange
      JWT_SECRET_KEY: replace-this-secret
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FLASK_APP: manage.py
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: smart_item_exchange
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_item_exchange"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
